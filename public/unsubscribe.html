<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Unsubscribe | ALP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060b1e;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#0d1333;border:1px solid #d4af37;border-radius:8px;max-width:520px;width:100%;padding:48px 40px;text-align:center}
.gl{height:3px;background:#d4af37;border-radius:8px 8px 0 0;margin:-48px -40px 40px -40px}
.logo{margin-bottom:32px}
.logo img{max-width:200px;height:auto}
.spinner{width:48px;height:48px;border:3px solid #1a2a50;border-top:3px solid #d4af37;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 28px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.checkmark{width:72px;height:72px;border-radius:50%;background:#0d1333;border:2px solid #d4af37;display:flex;align-items:center;justify-content:center;margin:0 auto 28px auto}
h1{font-family:Georgia,serif;font-size:26px;color:#d4af37;font-weight:normal;margin-bottom:20px;line-height:1.3}
p{font-size:15px;line-height:1.7;color:#ccc;margin-bottom:24px}
p strong{color:#fff}
.dv{height:1px;background:#1a2a50;margin:24px 0}
.fn{font-family:Georgia,serif;font-size:15px;color:#d4af37;margin-bottom:8px}
.ft{font-size:11px;color:#666;letter-spacing:1px;text-transform:uppercase}
.fl a{color:#aaa;text-decoration:none}
@media(max-width:560px){.card{padding:36px 24px}.gl{margin:-36px -24px 32px -24px}}
</style>
</head>
<body>
<div class="card">
  <div class="gl"></div>
  <div class="logo">
    <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663332724241/DgHCLkKImcFCcyLQ.png" alt="ALP">
  </div>
  <div id="icon"><div class="spinner"></div></div>
  <h1 id="headline">Processing...</h1>
  <p id="message">Please wait while we update your preferences.</p>
  <div class="dv"></div>
  <p class="fn">Marshall Wilkinson</p>
  <p class="ft">Founder, ALP &nbsp;|&nbsp; $2.5B+ in Construction</p>
  <div style="height:1px;background:#1a2a50;margin:16px 0"></div>
  <p class="fl"><a href="https://alpcontractorcircle.com">Visit ALP</a></p>
</div>

<script>
const SUPABASE_URL = "https://qqbwiuqaqjtbvxkvqplo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxYndpdXFhcWp0YnZ4a3ZxcGxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjEzNjMsImV4cCI6MjA4OTYzNzM2M30.Sv2T50J_uq3-KgOtI2OpFgHrBCZH2-BnnWCU2BOdkpY";

const CHECK_SVG = `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

function setIcon(type) {
  const el = document.getElementById("icon");
  if (type === "check") {
    el.innerHTML = `<div class="checkmark">${CHECK_SVG}</div>`;
  } else if (type === "error") {
    el.innerHTML = `<div class="checkmark"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>`;
  }
}

async function processUnsubscribe() {
  const params = new URLSearchParams(window.location.search);
  const email = params.get("email");

  if (!email) {
    setIcon("error");
    document.getElementById("headline").textContent = "Missing Email";
    document.getElementById("message").textContent = "No email address was provided in the unsubscribe link.";
    document.title = "Missing Email | ALP";
    return;
  }

  const decodedEmail = decodeURIComponent(email);

  try {
    // Check if already unsubscribed
    const checkRes = await fetch(
      `${SUPABASE_URL}/rest/v1/email_unsubscribes?email=eq.${encodeURIComponent(decodedEmail)}&select=id`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    const existing = await checkRes.json();

    if (Array.isArray(existing) && existing.length > 0) {
      setIcon("check");
      document.getElementById("headline").textContent = "Already Unsubscribed";
      document.getElementById("message").innerHTML = `<strong>${decodedEmail}</strong> is already removed from the ALP mailing list.`;
      document.title = "Already Unsubscribed | ALP";
      return;
    }

    // Insert new unsubscribe
    const ins = await fetch(`${SUPABASE_URL}/rest/v1/email_unsubscribes`, {
      method: "POST",
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json",
        Prefer: "return=minimal"
      },
      body: JSON.stringify({ email: decodedEmail, user_agent: navigator.userAgent })
    });

    if (ins.status === 201 || ins.status === 200) {
      setIcon("check");
      document.getElementById("headline").textContent = "You've Been Unsubscribed";
      document.getElementById("message").innerHTML = `<strong>${decodedEmail}</strong> has been successfully removed from the ALP mailing list. You will not receive any further emails from us.`;
      document.title = "You've Been Unsubscribed | ALP";
    } else {
      throw new Error("Insert failed: " + ins.status);
    }
  } catch (e) {
    console.error(e);
    setIcon("error");
    document.getElementById("headline").textContent = "Something Went Wrong";
    document.getElementById("message").textContent = "We encountered an issue processing your request. Please try again.";
    document.title = "Error | ALP";
  }
}

processUnsubscribe();
</script>
</body>
</html>
